name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  desktop-and-web:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm fmt:check

      - name: Build
        run: pnpm build

      - name: Verify desktop runtime dependencies
        run: pnpm --filter @glyph/desktop verify:runtime-deps

      - name: Verify Electron binary
        run: |
          ELECTRON_BIN=$(node -e "process.stdout.write(require('electron'))")
          echo "Electron binary: $ELECTRON_BIN"
          test -f "$ELECTRON_BIN" && echo "Binary exists" || (echo "Binary MISSING — re-running postinstall" && node node_modules/.pnpm/electron@*/node_modules/electron/install.js)
        working-directory: apps/desktop

      - name: Desktop smoke test
        run: |
          ulimit -n 65536 || true
          xvfb-run -a pnpm test:e2e:desktop
        env:
          CI: true
          PLAYWRIGHT_JUNIT_OUTPUT: test-results/junit.xml

      - name: Upload desktop Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-playwright-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            apps/desktop/playwright-report
            apps/desktop/test-results
