name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-macos:
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_VERSION: ${{ github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish macOS release
        run: pnpm --filter @glyph/desktop release -- --mac

      - name: Generate Homebrew cask
        run: pnpm cask:generate --version "${RELEASE_VERSION#v}" --artifact-path "apps/desktop/release/Glyph-${RELEASE_VERSION#v}-mac.dmg"

      - name: Commit updated Homebrew cask
        run: |
          git fetch origin main
          git switch main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/glyph.rb
          if git diff --cached --quiet; then
            echo "No Homebrew cask changes to commit."
            exit 0
          fi
          git commit -m "chore(cask): update glyph cask for ${RELEASE_VERSION}"
          git push origin main

  release-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Windows release
        run: pnpm --filter @glyph/desktop release -- --win
