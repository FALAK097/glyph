<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Glyph - A minimal markdown viewer and editor for macOS and Windows. Browse local notes, edit markdown fast, and read rendered documents in a focused desktop workspace." />
    <meta name="author" content="Falak Gala" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="application-name" content="Glyph" />
    <meta name="apple-mobile-web-app-title" content="Glyph" />
    <title>Glyph - Markdown, without the bloat</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <style>
      html { background-color: #fafafa; }
      html.dark { background-color: #000000; }
      body { background-color: #fafafa; }
      html.dark body { background-color: #000000; }
    </style>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("glyph.theme");
          const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const isDark = stored === "dark" || (stored !== "light" && systemPrefersDark);
          if (isDark) {
            document.documentElement.classList.add("dark");
          }
        } catch {
          // Ignore errors accessing localStorage.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
